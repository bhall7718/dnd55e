name: Auto Merge Localization PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v46

      - name: Verify only Localization files were changed
        id: verify
        run: |
          ALLOWED_PREFIX="Mods/DnD2024_897914ef-5c96-053c-44af-0be823f895fe/Localization/"
          ONLY_ALLOWED=true

          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            if [[ ! "$file" == "$ALLOWED_PREFIX"* ]]; then
              echo "Disallowed file changed: $file"
              ONLY_ALLOWED=false
              break
            fi
          done

          echo "only_allowed=$ONLY_ALLOWED" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.verify.outputs.only_allowed == 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
