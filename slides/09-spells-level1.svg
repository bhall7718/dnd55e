<text x="670" y="487" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">Spellfire Flare</tspan><tspan fill="#cdc4e0"> — Ranged spell attack; 2d10 Radiant damage</tspan></text>
<text x="670" y="512" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">Thunderous Smite</tspan><tspan fill="#cdc4e0"> — Bonus Action; imbue your next melee weapon attack with</tspan></text>
<text x="670" y="530" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#cdc4e0">2d6 Thunder damage</text>
<text x="670" y="555" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">Umbral Tendril</tspan><tspan fill="#cdc4e0"> — Ranged spell attack; 2d8 Necrotic damage on a hit, then</tspan></text>
<text x="670" y="573" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#cdc4e0">roll the damage dice…</text>
<text x="670" y="598" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">Witch Bolt</tspan><tspan fill="#cdc4e0"> — Initial hit now deals 2d12 Lightning damage</tspan></text>
<text x="670" y="623" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">Wrathful Smite</tspan><tspan fill="#cdc4e0"> — Bonus Action; imbue your next melee weapon attack with</tspan></text>
