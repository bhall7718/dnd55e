<text x="70" y="573" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#cdc4e0">originating from you…</text>
<text x="70" y="598" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">Wardaway</tspan><tspan fill="#cdc4e0"> — Constitution save; 2d4 Force damage (scales +2d4 per slot level</tspan></text>
<text x="70" y="616" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#cdc4e0">above 1st)</text>
