<text x="70" y="401" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">False Life</tspan><tspan fill="#cdc4e0"> — Now grants 2d4 + 4 temporary hit points (up from 1d4 + 4),</tspan></text>
