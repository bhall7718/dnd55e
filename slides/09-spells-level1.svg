<text x="70" y="469" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">Spectral Slash</tspan><tspan fill="#cdc4e0"> — Bonus Action; melee spell attack against a creature</tspan></text>
<text x="70" y="487" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#cdc4e0">within 20 ft (range…</text>
