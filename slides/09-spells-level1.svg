<text x="70" y="283" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#cdc4e0">Lightning, Poison, or Thunder</text>
<text x="70" y="308" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">Catapult</tspan><tspan fill="#cdc4e0"> — Hurl a nearby unattended 1-5 lb object up to 60 ft at a target</tspan></text>
<text x="70" y="333" font-family="Arial, Helvetica, sans-serif" font-size="13.5"><tspan font-weight="700" fill="#e8b84b">Cloak of Shadow</tspan><tspan fill="#cdc4e0"> — Bonus Action; Concentration; become Invisible and gain</tspan></text>
